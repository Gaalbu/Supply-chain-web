<div class="min-h-screen bg-gray-50 flex flex-col items-center pt-20 px-4 font-sans">
  
  <div class="text-center mb-8">
    <h1 class="text-4xl font-extrabold text-blue-900 mb-2">Rastreio de Pacotes</h1>
    <p class="text-gray-500">Acompanhe sua entrega em tempo real.</p>
  </div>

  <div class="w-full max-w-md bg-white p-2 rounded-full shadow-md flex items-center mb-10">
    <input 
      type="text" 
      placeholder="Digite o código (ex: BR123)..." 
      class="flex-1 px-4 py-2 outline-none rounded-full text-gray-700 uppercase"
      [(ngModel)]="codigoBusca"
    >
    <button 
      (click)="buscarPacote()"
      [disabled]="buscando()"
      class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-full transition-colors disabled:bg-blue-300">
      {{ buscando() ? 'Buscando...' : 'Buscar' }}
    </button>
  </div>

  <div *ngIf="resultado()" class="w-full max-w-md bg-white border border-gray-200 rounded-lg shadow-sm p-6">
    <div class="flex justify-between items-center mb-4">
      <span class="text-sm text-gray-500 font-medium">Código: {{ resultado().codigo }}</span>
      <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full">
        {{ resultado().status }}
      </span>
    </div>
    
    <div class="mb-2">
      <p class="text-sm text-gray-500">Destinatário:</p>
      <p class="font-semibold text-gray-800">{{ resultado().destinatario }}</p>
    </div>

    <div>
      <p class="text-sm text-gray-500">Última atualização:</p>
      <p class="font-semibold text-gray-800">{{ resultado().dataAtualizacao | date:'dd/MM/yyyy HH:mm' }}</p>
    </div>
  </div>

</div>
