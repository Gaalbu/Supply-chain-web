<div class="min-h-screen bg-gray-50 flex flex-col items-center justify-center font-sans">
  
  <div class="w-full max-w-md bg-white rounded-lg shadow-md p-8 border-t-4 border-blue-900">
    <div class="text-center mb-8">
      <h2 class="text-2xl font-bold text-gray-800">Acesso Restrito</h2>
      <p class="text-sm text-gray-500 mt-1">Área exclusiva para operadores logísticos</p>
    </div>

    <div *ngIf="erro()" class="mb-4 bg-red-100 border-l-4 border-red-500 text-red-700 p-4 text-sm" role="alert">
      <p>Usuário ou senha incorretos. Tente novamente.</p>
    </div>

    <form (ngSubmit)="fazerLogin()" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Usuário</label>
        <input 
          type="text" 
          [(ngModel)]="dadosLogin().login" 
          name="login"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none"
          placeholder="Digite seu login corporativo">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
        <input 
          type="password" 
          [(ngModel)]="dadosLogin().password" 
          name="password"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none"
          placeholder="••••••••">
      </div>

      <button 
        type="submit" 
        [disabled]="carregando()"
        class="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-2 px-4 rounded-md transition-colors disabled:bg-blue-400">
        {{ carregando() ? 'Autenticando...' : 'Entrar no Sistema' }}
      </button>
    </form>
  </div>

</div>
